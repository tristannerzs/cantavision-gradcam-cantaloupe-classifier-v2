name: smoke-test
on: [push, pull_request, workflow_dispatch]
jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile app/settings.py app/database.py app/ml.py app/main.py
